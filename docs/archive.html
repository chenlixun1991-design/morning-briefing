<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史存档 · 早间简报</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="date" id="currentDate"></div>
      <h1>📚 历史存档</h1>
      <p class="tagline">过往每日简报</p>
    </header>

    <main>
      <ul class="archive-list" id="archiveList">
        <li class="archive-item">
          <span>加载中...</span>
        </li>
      </ul>
    </main>

    <footer class="footer">
      <p><a href="index.html">← 返回今日简报</a></p>
      <p class="credit">by Tomato 🍅</p>
    </footer>
  </div>

  <script>
    function formatDisplayDate() {
      return new Date().toLocaleDateString('zh-CN', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    async function loadArchive() {
      document.getElementById('currentDate').textContent = formatDisplayDate();

      try {
        const response = await fetch('data/archive.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('Archive manifest not found');
        const list = await response.json();
        renderArchive(list);
      } catch (error) {
        console.error('Failed to load archive:', error);
        renderEmptyState();
      }
    }

    function renderArchive(list) {
      const container = document.getElementById('archiveList');
      if (!Array.isArray(list) || list.length === 0) {
        renderEmptyState();
        return;
      }

      container.innerHTML = list.map(item => `
        <li class="archive-item">
          <a href="index.html?date=${encodeURIComponent(item.date)}">
            <span>🍅 ${item.date}</span>
            <span class="news-source">${item.title || '查看简报'} →</span>
          </a>
        </li>
      `).join('');
    }

    function renderEmptyState() {
      document.getElementById('archiveList').innerHTML = `
        <li class="archive-item">
          <span>📅 暂无历史存档，请稍后再试</span>
        </li>
      `;
    }

    document.addEventListener('DOMContentLoaded', loadArchive);
  </script>
</body>
</html>
